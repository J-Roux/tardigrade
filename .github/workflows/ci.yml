name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  compiler: gcc,   cc: gcc,   cxx: g++,     build_type: Release }
          - { os: ubuntu-latest,  compiler: gcc,   cc: gcc,   cxx: g++,     build_type: Debug   }
          - { os: ubuntu-latest,  compiler: clang, cc: clang, cxx: clang++, build_type: Release }
          - { os: ubuntu-latest,  compiler: clang, cc: clang, cxx: clang++, build_type: Debug   }
          - { os: macos-latest,   compiler: clang, cc: clang, cxx: clang++, build_type: Release }
          - { os: macos-latest,   compiler: clang, cc: clang, cxx: clang++, build_type: Debug   }
          - { os: windows-latest, compiler: msvc,  build_type: Release }
          - { os: windows-latest, compiler: msvc,  build_type: Debug   }

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-

      - name: Build and test
        run: conan build . -s build_type=${{ matrix.build_type }} --build=missing
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

  avr:
    name: AVR size check
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git cmake make avr-gcc avr-libc

      - uses: actions/checkout@v4

      - name: Verify toolchain version
        run: avr-gcc --version

      - name: Configure
        run: cmake -B build-avr -DCMAKE_TOOLCHAIN_FILE=cmake/avr-toolchain.cmake

      - name: Build
        run: cmake --build build-avr

      - name: Print size
        run: avr-size --format=avr --mcu=atmega328p build-avr/examples/ping_pong_bare
