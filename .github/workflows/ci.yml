name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        include:
          # GCC on Linux
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          # Clang on Linux
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          # Apple Clang on macOS
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
          # MSVC on Windows
          - os: windows-latest
            compiler: msvc
            cc: cl
            cxx: cl

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Set compiler (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          conan profile update settings.compiler.version=$(${CXX} --version | grep -oP '\d+\.\d+' | head -1) default || true
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-

      - name: Build and test
        run: conan build . -s build_type=${{ matrix.build_type }} --build=missing
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

  avr:
    name: AVR size check
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git cmake avr-gcc avr-libc

      - uses: actions/checkout@v4

      - name: Verify toolchain version
        run: avr-gcc --version

      - name: Configure
        run: cmake -B build-avr -DCMAKE_TOOLCHAIN_FILE=cmake/avr-toolchain.cmake

      - name: Build
        run: cmake --build build-avr

      - name: Print size
        run: avr-size --format=avr --mcu=atmega328p build-avr/examples/ping_pong_bare
