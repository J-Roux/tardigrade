name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ matrix.os }}-${{ matrix.build_type }}-

      - name: Build and test
        run: conan build . -s build_type=${{ matrix.build_type }} --build=missing

  avr:
    name: AVR size check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: sudo apt-get install -y gcc-avr avr-libc binutils-avr

      - name: Configure
        run: cmake -B build-avr -DCMAKE_TOOLCHAIN_FILE=cmake/avr-toolchain.cmake

      - name: Build
        run: cmake --build build-avr

      - name: Print size
        run: avr-size --format=avr --mcu=atmega328p build-avr/examples/ping_pong_bare
